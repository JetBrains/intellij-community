[target.'cfg(all(target_os = "windows", target_env = "msvc"))']
rustflags = ["-C", "target-feature=+crt-static", "-l", "legacy_stdio_definitions"]

[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))']
rustflags = [
  "-C", "link-arg=-mmacosx-version-min=11.0",
  "-C", "link-arg=-Wl,-headerpad_max_install_names",  # header pad for install_name_tool -add_rpath (see FleetProductImageBuild.patchLauncherRPath)
]

[target.'cfg(all(target_os = "macos", target_arch = "x86_64"))']
rustflags = [
  "-C", "link-arg=-mmacosx-version-min=10.15",
  "-C", "link-arg=-Wl,-headerpad_max_install_names",  # header pad for install_name_tool -add_rpath (see FleetProductImageBuild.patchLauncherRPath)
]

[target.'cfg(all(target_os = "linux", target_env = "musl"))']
rustflags = ["-C", "target-feature=-crt-static"]
