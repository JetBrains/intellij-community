# https://bazel.build/reference/command-line-reference#common_options-flag--downloader_config

# allow list:
allow bcr.bazel.build
allow cache-redirector.jetbrains.com
# e.g. https://cdn.azul.com/zulu/bin/zulu17.50.19-ca-jdk17.0.11-macosx_aarch64.tar.gz
allow cdn.azul.com
# e.g. https://dl.google.com/android/maven2/androidx/collection/collection-jvm/1.5.0/collection-jvm-1.5.0.jar
allow dl.google.com
allow mirror.bazel.build
allow packages.jetbrains.team
# e.g. https://pypi.org/simple/idna/
allow pypi.org
allow go.dev
allow download.jetbrains.com

# rewrite list:
rewrite ^files\.pythonhosted\.org/packages/(.*)$ https://cache-redirector.jetbrains.com/files.pythonhosted.org/packages/$1
rewrite ^github\.com/(.*)$ https://cache-redirector.jetbrains.com/github.com/$1
rewrite ^gitlab\.arm\.com/(.*)$ https://cache-redirector.jetbrains.com/gitlab.arm.com/$1
rewrite ^maven\.google\.com/(.*)$ https://cache-redirector.jetbrains.com/maven.google.com/$1
rewrite ^nodejs\.org/(.*)$ https://cache-redirector.jetbrains.com/nodejs.org/$1
rewrite ^registry\.npmjs\.org/(.*)$ https://cache-redirector.jetbrains.com/registry.npmjs.org/$1
rewrite ^repo1\.maven\.org/(.*)$ https://cache-redirector.jetbrains.com/repo1.maven.org/$1
rewrite ^repo\.gradle\.org/(.*)$ https://cache-redirector.jetbrains.com/repo.gradle.org/$1
rewrite ^services\.gradle\.org/(.*)$ https://cache-redirector.jetbrains.com/services.gradle.org/$1
rewrite ^android\.googlesource\.com/(.*)$ https://cache-redirector.jetbrains.com/android.googlesource.com/$1
rewrite ^commondatastorage\.googleapis\.com/(.*)$ https://cache-redirector.jetbrains.com/commondatastorage.googleapis.com/$1
# `ftp.gnu.org` is unreliable, so we mirror `ftpmirror.gnu.org` instead see: https://jetbrains.slack.com/archives/C0XLQPQGP/p1766415915705409?thread_ts=1766141184.355299&cid=C0XLQPQGP
rewrite ^ftp\.gnu\.org/(.*)$ https://cache-redirector.jetbrains.com/ftpmirror.gnu.org/$1
rewrite ^archive\.ubuntu\.com/(.*)$ https://cache-redirector.jetbrains.com/archive.ubuntu.com/$1
rewrite ^ports\.ubuntu\.com/(.*)$ https://cache-redirector.jetbrains.com/ports.ubuntu.com/$1
rewrite ^static\.rust-lang\.org/(.*)$ https://cache-redirector.jetbrains.com/static.rust-lang.org/$1
rewrite ^static\.crates\.io/(.*)$ https://cache-redirector.jetbrains.com/static.crates.io/$1
rewrite ^index\.crates\.io/(.*)$ https://cache-redirector.jetbrains.com/index.crates.io/$1
rewrite ^cpan\.metacpan\.org/(.*)$ https://cache-redirector.jetbrains.com/cpan.metacpan.org/$1
rewrite ^sourceforge\.net/(.*)$ https://cache-redirector.jetbrains.com/sourceforge.net/$1
rewrite ^musl\.libc\.org/(.*)$ https://cache-redirector.jetbrains.com/musl.libc.org/$1
rewrite ^raw\.githubusercontent\.com/(.*)$ https://cache-redirector.jetbrains.com/raw.githubusercontent.com/$1
rewrite ^swcdn\.apple\.com/(.*)$ https://packages.jetbrains.team/files/p/ij/swcdn-apple-com-mirror/$1
rewrite ^gitlab\.freedesktop\.org/(.*)$ https://cache-redirector.jetbrains.com/gitlab.freedesktop.org/$1
rewrite ^nuget\.org/(.*)$ https://cache-redirector.jetbrains.com/nuget.org/$1
rewrite ^www\.nuget\.org/(.*)$ https://cache-redirector.jetbrains.com/www.nuget.org/$1
rewrite ^download\.visualstudio\.microsoft\.com/(.*)$ https://cache-redirector.jetbrains.com/download.visualstudio.microsoft.com/$1
rewrite ^cosmo\.zip/(.*)$ https://cache-redirector.jetbrains.com/cosmo.zip/$1
rewrite ^releases\.hashicorp\.com/(.*)$ https://cache-redirector.jetbrains.com/releases.hashicorp.com/$1

# block by default:
block *
