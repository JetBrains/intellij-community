# Mirrors the 'Build Scripts Platform Tests' run configuration, which runs package 'org.jetbrains.intellij' within the
# single module 'intellij.platform.buildScripts.tests'. A test group is matched purely by class name across every module
# on the run classpath, so the broad include below also matches 'org.jetbrains.intellij.build.*' tests that live in other
# modules NOT reachable from 'intellij.platform.buildScripts.tests'. Those are excluded here so the group matches exactly
# this module's tests (enforced by UltimateProjectTestsStructureTest 'test groups only match tests reachable on its classpath').
[BUILD_SCRIPTS_PLATFORM_TESTS]
org.jetbrains.intellij.*
# different modules that happen to share the org.jetbrains.intellij.build.* namespace:
-org.jetbrains.intellij.build.io.*
-org.jetbrains.intellij.build.productLayout.*
-org.jetbrains.intellij.build.appCode.*
-org.jetbrains.intellij.build.clion.*
-org.jetbrains.intellij.build.dataGrip.*
-org.jetbrains.intellij.build.gateway.*
-org.jetbrains.intellij.build.goland.*
-org.jetbrains.intellij.build.IdeaCommunityBuildTest
-org.jetbrains.intellij.build.mps.*
-org.jetbrains.intellij.build.phpStorm.*
-org.jetbrains.intellij.build.thinClient.*
-org.jetbrains.intellij.build.images.*
-org.jetbrains.intellij.build.pycharm.*
-org.jetbrains.intellij.build.meta.*
-org.jetbrains.intellij.build.rubyMine.*
-org.jetbrains.intellij.build.webStorm.*
