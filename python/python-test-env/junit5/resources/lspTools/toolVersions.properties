# Pinned versions of the external Python tools exercised by the env tests.
#
# This is the single source of truth shared by every test that installs one of these tools into its
# venv (see LspToolVersions in com.intellij.python.test.env.junit5). The tests assert version-specific
# tool behaviour (e.g. Ruff's quote normalization and import sorting), so bump these deliberately and
# re-verify the assertions when changing a version. Keys are the PyPI package names installed.
ty=0.0.51
ruff=0.15.18
basedpyright=1.39.8
pyrefly=1.1.1
# Library dependencies installed by env tests (not tools), pinned here for the same reproducibility reasons.
pandas=3.0.2
