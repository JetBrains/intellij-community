  making it easier to organize and maintain.
pyproject.preview.settings.note=Or toggle it in <a href="jetbrains://Python/settings?name=Project+Structure">Settings > Project Structure</a>.
pyproject.preview.current=Before
pyproject.preview.after=After
pyproject.preview.enable=Enable Workspace
pyproject.preview.how.it.works=How does it work?
pyproject.preview.project.structure=Project structure
pyproject.preview.how.it.works.content=\
  Directories containing <b>pyproject.toml</b> will become managed Python projects \
  <icon src="PythonPyprojectIcons.Model.PyProjectModule"/> (highlighted below).
pyproject.preview.sub.project.naming=Python project naming
pyproject.preview.sub.project.naming.content=\
  Each project name is derived from the <b>[project] name</b> field in its pyproject.toml. \
  If the field is missing, the directory name is used instead.<br/><br/>\
  Project names in the IDE must be unique. \
  When multiple pyproject.toml files resolve to the same name, the IDE appends an <b>@N</b> suffix \
  (starting from <b>@1</b>) to disambiguate them. \
  To avoid this, ensure each pyproject.toml in the workspace declares a distinct <b>[project] name</b>.
pyproject.preview.dependencies=Dependencies
pyproject.preview.dependencies.content=\
  Dependencies between projects are resolved automatically from <b>pyproject.toml</b> declarations. \
  Project structure is stored in <b>.iml</b> files inside the <b>.idea</b> directory \
  and is generated from pyproject.toml on each sync.
pyproject.preview.how.to.create=How to create a workspace?
pyproject.preview.how.to.create.content=\
  To let the IDE resolve dependencies between projects in the workspace, \
  declare them in your <b>pyproject.toml</b> using one of the approaches below.
pyproject.preview.uv.workspaces=uv workspaces
pyproject.preview.uv.workspaces.description=Single virtual environment shared across all projects.
pyproject.preview.uv.workspaces.content=[tool.uv.workspace]\n\
  members = ["packages/*"]\n\
  \n\
  [project]\n\
  dependencies = ["my-lib"]\n\
  \n\
  [tool.uv.sources]\n\
  my-lib = { workspace = true }
pyproject.preview.uv.independent=uv path dependencies
pyproject.preview.uv.independent.description=Each project has its own virtual environment.
pyproject.preview.uv.independent.content=[project]\n\
  dependencies = ["my-lib"]\n\
  \n\
  [tool.uv.sources]\n\
  my-lib = { path = "../my-lib" }
pyproject.preview.poetry=Poetry path dependencies
pyproject.preview.poetry.content=[tool.poetry.dependencies]\n\
  my-lib = { path = "../my-lib", develop = true }
pyproject.preview.learn.more=Learn more
pyproject.preview.select.in.project.view=Select in Project View
