# pyproject.toml (root)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "my-hatch-monorepo"
version = "0.1.0"
description = "A Hatch monorepo example"
requires-python = ">=3.12"
dependencies = [
    "requests",
]

[tool.hatch.envs.default]
workspace.members = ["packages/*"]

[tool.hatch.metadata]
allow-direct-references = true