[project]
name = "example.parent"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "example.failure>0.0.0",
  "example.success>0.0.0",
  "Example.Extra>0.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
