inputs:
  os:
    description: 'linux, windows or mac'
    required: true
  suffix:
    description: 'For x64: .tar.gz, .exe, .sit or .dmg; for aarch64: -aarch64.tar.gz, -aarch64.exe, -aarch64.sit or -aarch64.dmg'
    required: true
  artifacts_dir:
    description: 'IDE artifacts output directory'
    required: true
runs:
  using: composite
  steps:
    - name: Generate checksums
      shell: bash
      # language=bash
      run: |
        function checksum() {
          file="$1"
          # The output is a line with checksum,
          # a character indicating type ('*' for --binary, ' ' for --text),
          # and the supplied file argument
          if [ "$(uname)" == Darwin ]; then
            shasum --algorithm 256 --binary "$file" 
          else
            sha256sum --binary "$file" 
          fi > "$file.sha256"
        }
        cd "${{inputs.artifacts_dir}}"
        for it in *${{inputs.suffix}}; do checksum "$it"; done
        if ls *${{inputs.suffix}}.spdx.json; then
          for it in *${{inputs.suffix}}.spdx.json; do checksum "$it"; done
        fi
    - name: Upload ${{inputs.suffix}}
      uses: actions/upload-artifact@v6.0.0
      with:
        name: ${{inputs.os}}${{inputs.suffix}}-unsigned
        if-no-files-found: 'error'
        retention-days: 1
        path: |
          ${{inputs.artifacts_dir}}/*.SNAPSHOT${{inputs.suffix}}
          ${{inputs.artifacts_dir}}/*.SNAPSHOT${{inputs.suffix}}.spdx.json
          ${{inputs.artifacts_dir}}/*.SNAPSHOT${{inputs.suffix}}.sha256