<!doctype html>
<html lang="en">
<head>
  <script src="/__webview/wvi-bridge.js"></script>
  <script src="/__webview/wvi-platform-features.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Link Graph</title>
  <script type="module" src="./view.js"></script>
  <link rel="modulepreload" href="./assets/rolldown-runtime.js">
  <link rel="modulepreload" href="./assets/braintree-sanitize-url.js">
  <link rel="modulepreload" href="./assets/iconify-utils.js">
  <link rel="modulepreload" href="./assets/chevrotain.js">
  <link rel="modulepreload" href="./assets/chevrotain-allstar.js">
  <link rel="modulepreload" href="./assets/cose-base.js">
  <link rel="modulepreload" href="./assets/cytoscape-cose-bilkent.js">
  <link rel="modulepreload" href="./assets/cytoscape-fcose.js">
  <link rel="modulepreload" href="./assets/cytoscape.js">
  <link rel="modulepreload" href="./assets/d3-array.js">
  <link rel="modulepreload" href="./assets/d3-axis.js">
  <link rel="modulepreload" href="./assets/d3.js">
  <link rel="modulepreload" href="./assets/d3-format.js">
  <link rel="modulepreload" href="./assets/d3-hierarchy.js">
  <link rel="modulepreload" href="./assets/d3-color.js">
  <link rel="modulepreload" href="./assets/d3-interpolate.js">
  <link rel="modulepreload" href="./assets/d3-path.js">
  <link rel="modulepreload" href="./assets/d3-sankey.js">
  <link rel="modulepreload" href="./assets/d3-scale-chromatic.js">
  <link rel="modulepreload" href="./assets/d3-scale.js">
  <link rel="modulepreload" href="./assets/d3-selection.js">
  <link rel="modulepreload" href="./assets/d3-shape.js">
  <link rel="modulepreload" href="./assets/dagre-d3-es.js">
  <link rel="modulepreload" href="./assets/dayjs.js">
  <link rel="modulepreload" href="./assets/dompurify.js">
  <link rel="modulepreload" href="./assets/khroma.js">
  <link rel="modulepreload" href="./assets/langium.js">
  <link rel="modulepreload" href="./assets/marked.js">
  <link rel="modulepreload" href="./assets/mermaid.js">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="ij-webview-root graph-root">
<main class="shell">
  <header class="toolbar">
    <button id="refreshButton" type="button">Refresh</button>
    <span id="stats" class="stats">Loading...</span>
  </header>
  <section id="content" class="content">
    <section id="graph" class="graph" aria-label="Markdown link graph"></section>
    <div id="splitter" class="splitter" role="separator" aria-label="Resize preview" aria-orientation="vertical" aria-controls="previewPanel" tabindex="0"></div>
    <aside id="previewPanel" class="preview" aria-label="Markdown document preview" aria-hidden="true">
      <header class="previewHeader">
        <div id="previewTitle" class="previewTitle"></div>
        <div id="previewPath" class="previewPath"></div>
      </header>
      <article id="previewBody" class="previewBody"></article>
    </aside>
  </section>
</main>
</body>
</html>
