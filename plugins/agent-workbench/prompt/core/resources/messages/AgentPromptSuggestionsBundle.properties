popup.suggestion.tests.fix.label=Fix failures
popup.suggestion.tests.fix.prompt=Make the failing tests pass. First, in chat, name for each failure whether the bug is in the production code or the test, with a one-sentence justification. Then fix only the side you named. Do not weaken assertions or delete test cases.
popup.suggestion.tests.explain.label=Explain failures
popup.suggestion.tests.explain.prompt=Explain why these tests are failing and which code is responsible. Do not change anything.
popup.suggestion.tests.bisect.label=Bisect
popup.suggestion.tests.bisect.prompt=Find the commit that introduced these failures. Read `git log -p` on the failing test files and the production code paths they exercise; pick suspects from the diffs, not commit messages. List your top 1-3 candidates with the diff hunk that likely caused the regression. Do not claim certainty unless you actually ran the test at that revision.
popup.suggestion.tests.coverage.label=Explain coverage
popup.suggestion.tests.coverage.prompt=Explain what these tests cover, which behaviors they verify, and which behaviors they leave out.
popup.suggestion.tests.review.label=Audit tests
popup.suggestion.tests.review.prompt=Audit these tests for brittle assumptions, weak assertions, hidden dependencies, or suspicious passes.
popup.suggestion.tests.extend.label=Add tests
popup.suggestion.tests.extend.prompt=Add tests to the same test file(s) as the selected tests, covering behaviors the existing tests miss in the same units under test. For each new test, state the coverage gap it closes.
popup.suggestion.vcs.review.label=Review commits
popup.suggestion.vcs.review.prompt=Review the selected commits for risks, regressions, or missing follow-up work.
popup.suggestion.vcs.summary.label=Summarize commits
popup.suggestion.vcs.summary.prompt=Summarize what changed across these commits, grouped by area; call out anything risky or unusual.
popup.suggestion.vcs.followup.label=List follow-ups
popup.suggestion.vcs.followup.prompt=List the follow-up work, TODOs, and loose ends implied by these commits - tests not yet added, references not yet cleaned up, behavior left for later.
popup.suggestion.editor.explain.label=Explain code
popup.suggestion.editor.explain.prompt=Explain the selected code and how its callers use it.
popup.suggestion.editor.refactor.label=Refactor code
popup.suggestion.editor.refactor.prompt=Refactor the selected code for readability. Do not change observable behavior - same return values, same exceptions, same side effects, same threading. If you cannot guarantee equivalence for a transformation, skip it and say why. List each transformation you applied.
popup.suggestion.editor.review.label=Review code
popup.suggestion.editor.review.prompt=Review the selected code for bugs, edge cases, or missing tests.
popup.suggestion.paths.summary.label=Summarize files
popup.suggestion.paths.summary.prompt=Summarize what these files do and how they fit together.
popup.suggestion.paths.impact.label=Map impact
popup.suggestion.paths.impact.prompt=Map dependencies and call relationships across these files; highlight the likely blast-radius areas if any of them change.
popup.suggestion.paths.duplication.label=Find duplication
popup.suggestion.paths.duplication.prompt=Find duplicated logic, overlapping responsibilities, or near-identical structure across these files.
