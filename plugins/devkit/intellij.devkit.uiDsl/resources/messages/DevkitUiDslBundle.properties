demo.gaps.title=Gaps
demo.gaps.description=<br>\u2022 Horizontal gaps are managed by Cell.gap method. Between label and related component RightGap.SMALL is used, otherwise medium gap is used (there is no such enum value)<br>\u2022 Left indent can be added by Panel.indent<br>\u2022 For two columns mode use Panel.twoColumnsRow or RightGap.COLUMNS<br>\u2022 Vertical gaps are absent by default (there is minimum space between components) and can be added by Row.topGap and Row.bottomGap methods. Such gaps should be appended to 'related' rows (so if row is hidden with gaps remaining layout is not broken). Note that some elements like Panel.group can add additional space around
