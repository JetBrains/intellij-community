demo.basics.title=Basics
demo.basics.description=UI DSL builder builds content row by row. Every row consist of cells, last cell in row occupies all remaining width. Rows have layout property (see RowLayout) which specify policy of cells layout in row.<br>Result of builder is a grid like structure (see GridLayout), where near cells can be merged into one cell. Every cell can contain some component or a sub-grid.
