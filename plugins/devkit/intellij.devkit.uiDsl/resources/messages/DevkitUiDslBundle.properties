demo.groups.panel.comment=Panel.panel method creates sub-panel that occupies whole width and uses own grid inside
demo.groups.rows.range.row=Panel.rowsRange row:
demo.groups.rows.range.comment=Panel.rowsRange is similar to Panel.panel but uses the same grid as parent. Useful when grouped content should be managed together with RowsRange.enabledIf for example
demo.groups.group.title=Panel.group
demo.groups.group.row=Panel.group row:
