demo.groups.collapsible.row=Panel.collapsibleGroup row:
demo.groups.collapsible.comment=Panel.collapsibleGroup adds collapsible panel with independent grid, title and some vertical space before/after the group. The group title is focusable via the Tab key and supports mnemonics
