buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.6.20")
    }
}

apply plugin: 'kotlin-platform-js'

repositories {
        mavenCentral()
    }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-js:1.1.0"
    implement project(":")
}
