buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.6.20")
    }
}

apply plugin: 'kotlin-platform-js'

sourceSets {
    myMain {
        kotlin {
            srcDir 'src'
        }
    }
    myTest {
        kotlin {
            srcDir 'test'
        }
    }
}

repositories {
        mavenCentral()
    }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-js"
    implement project(":")
}
