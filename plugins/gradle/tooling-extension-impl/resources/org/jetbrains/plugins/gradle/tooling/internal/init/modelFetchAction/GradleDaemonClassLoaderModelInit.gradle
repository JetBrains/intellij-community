//file:noinspection GrPackage

// This init-script is optional, enabled since Gradle 7.3

import com.intellij.gradle.toolingExtension.impl.model.util.daemonClassLoaderModel.GradleDaemonClassLoaderModelBuilder
import org.gradle.tooling.provider.model.ToolingModelBuilderRegistry
import javax.inject.Inject

beforeSettings { settings ->
  settings.plugins.apply(GradleDaemonClassLoaderModelPlugin)
}

class GradleDaemonClassLoaderModelPlugin implements Plugin<Settings> {

  private final ToolingModelBuilderRegistry registry

  @Inject
  GradleDaemonClassLoaderModelPlugin(ToolingModelBuilderRegistry registry) {
    this.registry = registry
  }

  void apply(Settings settings) {
    registry.register(new GradleDaemonClassLoaderModelBuilder())
  }
}